name: CI backend brasil_panel

# run
on:
  push:
    branches:
      - ["main", "master"]
  pull_request:
    branches:
      - ["main", "master"]
jobs:
  # ==========================================
  # 1. CI DO BACKEND (JAVA / SPRING BOOT)
  # ==========================================
  backend-ci:
    name: Backend CI (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'backend/pom.xml'

      # 1. INSTALL & BUILD
      - name: Compilar Java (Install & Build)
        run: mvn clean compile

      # 2. TEST (Executar os testes unitários e de integração)
      - name: Executar Testes
        run: mvn test

      # 3. PACKAGE
      - name: Empacotar Aplicação (.jar)
        run: mvn package -DskipTests

    # ==========================================
    # 2. CI DO FRONTEND (REACT + TYPESCRIPT)
    # ==========================================
    frontend-ci:
      name: Frontend CI (React TS)
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: ./frontend

      steps:
        - name: Baixar código do repositório
          uses: actions/checkout@v4

        - name: Configurar Node.js 24
          uses: actions/setup-node@v4
          with:
            node-version: '24'
            cache: 'npm'
            cache-dependency-path: 'frontend/package-lock.json'

        # 1. INSTALL
        - name: Instalar Dependências (npm ci)
          run: npm ci

        # 2. TEST
        - name: Executar Testes
          run: npm test -- --watchAll=false
          env:
            CI: true

        # 3. BUILD
        - name: Build do Frontend (Vite/Webpack + TS Check)
          run: npm run build

spring:
  profiles:
    active: dev

  security:
    filter:
      order: 10

  mvc:
    async:
      request-timeout: 15000

server:
  port: 8080

# ── JWT ──────────────────────────────────────────────────────────────────────
# Em produção, sobrescreva via variável de ambiente: JWT_SECRET=<sua-chave-256-bits>
jwt:
  secret: ${JWT_SECRET:mude-esta-chave-para-producao-use-256-bits-ou-mais!!}
  expiration-ms: 86400000  # 24 h

# ── CORS ─────────────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  # ── Admin seed ─────────────────────────────────────────────────────────────
  # Credenciais definidas em application-local.yaml (gitignored) ou via env vars:
  #   ADMIN_EMAIL    — e-mail do admin
  #   ADMIN_PASSWORD — senha do admin (mín. 8 caracteres); se vazio, admin não é criado
  admin:
    email:    ${ADMIN_EMAIL:admin@brasilpanel.com}
    password: ${ADMIN_PASSWORD:}

  # Remetente dos e-mails — sobrescrito em application-dev.yml / env vars
  mail:
    from-address: ${MAIL_FROM_ADDRESS:onboarding@resend.dev}
    from-name:    ${MAIL_FROM_NAME:Brasil Panel}

# ── Springdoc — desabilitado por padrão; ativado apenas no perfil dev ────────
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false